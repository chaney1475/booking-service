spring:
  application:
    name: booking-service
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:booking}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 25   # 2 CPU 파드 + MySQL 1 CPU 기준 적정값 (50은 MySQL 과부하)
      minimum-idle: 10
      connection-timeout: 5000

  cache:
    type: caffeine
    cache-names: eventOption
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10s

  sql:
    init:
      mode: always   # schema.sql 항상 실행

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 200          # 2 CPU 파드 기준 (400은 컨텍스트 스위칭 과부하)
      min-spare: 100    # 기동 직후 즉시 사용 가능한 스레드 확보
    max-connections: 2000
    accept-count: 300

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 20
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 1s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        ignore-exceptions:
          - com.example.booking.common.exception.BaseException

payment:
  mock:
    failure-rate: 0.0   # 기본값 0 — 로컬 테스트 시 항상 승인. 실패율 테스트는 application-perf.yml 참조
    timeout-rate: 0.0

logging:
  level:
    org.hibernate.SQL: debug
