spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:booking}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50   # 30→100은 MySQL 동시 쿼리 과부하, 50이 스위트스팟
      minimum-idle: 20        # 워밍업 후 즉시 사용 가능한 커넥션 확보
      connection-timeout: 3000

  sql:
    init:
      mode: always   # schema.sql 항상 실행

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 400          # 기본 200 → 1000 VU 동시 부하 대응
      min-spare: 200    # 워밍업 없이도 200 스레드 미리 확보 (콜드 스타트 방지)
    max-connections: 2000
    accept-count: 500   # 기본 100 → TCP 백로그 큐 확장

resilience4j:
  circuitbreaker:
    instances:
      redis:
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 20
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 1s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        ignore-exceptions:
          - com.example.booking.common.exception.BaseException

payment:
  mock:
    failure-rate: 0.3
    timeout-rate: 0.05

logging:
  level:
    org.hibernate.SQL: debug
